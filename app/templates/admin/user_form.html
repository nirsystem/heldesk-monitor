{% extends 'base.html' %}
{% block title %}משתמש חדש — HelpDesk Pro{% endblock %}
{% block page_title %}<i class="fa-solid fa-user-plus me-2 text-primary"></i>יצירת משתמש חדש{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-5">
    <div class="card" style="border:none;box-shadow:0 1px 3px rgba(0,0,0,.08);border-radius:12px">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-500" for="username">
              שם משתמש <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="david" required maxlength="50" pattern="[a-zA-Z0-9_]+">
            <div class="form-text">אותיות לועזיות, ספרות וקו תחתון בלבד</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500" for="email">כתובת מייל</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="david@company.com">
          </div>
          <div class="mb-3">
            <label class="form-label fw-500" for="password">
              סיסמה <span class="text-danger">*</span>
            </label>
            <input type="password" class="form-control" id="password" name="password"
                   required minlength="6" placeholder="לפחות 6 תווים">
          </div>
          <div class="mb-4">
            <label class="form-label fw-500" for="role">תפקיד</label>
            <select class="form-select" id="role" name="role">
              <option value="user">User — משתמש רגיל</option>
              <option value="technician">Technician — טכנאי</option>
              <option value="admin">Admin — מנהל מערכת</option>
            </select>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" style="border-radius:8px;padding:.6rem 1.5rem">
              <i class="fa-solid fa-user-plus me-2"></i>צור משתמש
            </button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary" style="border-radius:8px">
              ביטול
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
