<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>התחברות — HelpDesk Pro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      width: 56px; height: 56px;
      background: #3b82f6;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; color: #fff;
      margin: 0 auto 1.25rem;
    }
    .login-card h1 { font-size: 1.4rem; font-weight: 700; color: #1e293b; }
    .login-card .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 1.75rem; }
    .form-label { font-size: 0.85rem; font-weight: 500; color: #374151; }
    .form-control { border-radius: 8px; border-color: #d1d5db; }
    .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .btn-login {
      background: #3b82f6; border: none;
      border-radius: 8px; width: 100%;
      padding: 0.65rem; font-weight: 600; font-size: 0.95rem;
    }
    .btn-login:hover { background: #2563eb; }
    .default-creds {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 8px; padding: 0.65rem 0.85rem;
      font-size: 0.78rem; color: #166534; margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <div class="login-logo"><i class="fa-solid fa-headset"></i></div>
    <h1>HelpDesk Pro</h1>
    <p class="subtitle">Enterprise Ticket System</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} text-start mb-3 py-2" style="font-size:.85rem">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="text-start">
      <div class="mb-3">
        <label class="form-label" for="username">שם משתמש</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-user fa-sm text-secondary"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="הכנס שם משתמש" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="password">סיסמה</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock fa-sm text-secondary"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="הכנס סיסמה" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-login">
        <i class="fa-solid fa-right-to-bracket me-2"></i>התחבר
      </button>
    </form>

    <div class="default-creds text-start">
      <i class="fa-solid fa-circle-info me-1"></i>
      ברירת מחדל: <strong>admin</strong> / <strong>Admin@1234</strong>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
